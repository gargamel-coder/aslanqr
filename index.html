<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Studio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap');

*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#fafafa;--surface:#fff;--surface2:#f5f5f5;
  --border:#e5e5e5;--border-hover:#ccc;
  --text:#1a1a1a;--text-dim:#888;--text-faint:#bbb;
  --accent:#000;--accent-soft:#333;
}

body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh}

.container{max-width:940px;margin:0 auto;padding:48px 24px 80px}

header{text-align:center;margin-bottom:56px;animation:fadeUp .7s ease}
header h1{font-family:'Instrument Serif',serif;font-size:clamp(2.4rem,5vw,3.6rem);font-weight:400;letter-spacing:-.02em;color:var(--accent)}
header p{color:var(--text-dim);font-size:.75rem;letter-spacing:.18em;text-transform:uppercase;margin-top:4px}

.generator{display:grid;grid-template-columns:1fr 240px;gap:36px;align-items:start;margin-bottom:64px;animation:fadeUp .7s ease .05s both}
@media(max-width:680px){.generator{grid-template-columns:1fr;justify-items:center}}

.input-area{width:100%}
.input-area label{display:block;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);margin-bottom:10px}
.input-area input[type=text]{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.85rem;font-weight:300;padding:16px 18px;outline:none;transition:border-color .3s}
.input-area input:focus{border-color:var(--accent)}
.input-area input::placeholder{color:var(--text-faint)}
.label-input{margin-top:12px}

.btn-row{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.btn{padding:10px 22px;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .25s}
.btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-primary:hover{background:var(--accent-soft)}

.qr-preview{width:240px;height:240px;background:#fff;border-radius:14px;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden}
.qr-preview.empty{border-style:dashed}
.qr-preview.empty::after{content:'QR';font-family:'Instrument Serif',serif;font-size:2.6rem;color:var(--text-faint)}
.qr-preview canvas,.qr-preview img{max-width:208px!important;max-height:208px!important}

.section{margin-bottom:56px;animation:fadeUp .7s ease .1s both}
.section-title{font-family:'Instrument Serif',serif;font-size:1.5rem;font-weight:400;margin-bottom:4px}
.section-sub{color:var(--text-dim);font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;margin-bottom:24px}

.projects-grid{display:grid;gap:10px}
.project-card{display:grid;grid-template-columns:48px 1fr auto;gap:14px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:all .2s}
.project-card:hover{border-color:var(--accent)}
.project-card.active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
.project-card .mini-qr{width:48px;height:48px;background:var(--surface2);border-radius:6px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.project-card .mini-qr img{max-width:44px!important;max-height:44px!important}
.project-card .info{overflow:hidden}
.project-card .info .name{font-weight:500;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.project-card .info .url{font-family:'JetBrains Mono',monospace;font-size:.72rem;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.project-card .meta{text-align:right;white-space:nowrap}
.project-card .meta .scans-num{font-family:'JetBrains Mono',monospace;font-size:1.1rem;font-weight:400}
.project-card .meta .date{font-size:.65rem;color:var(--text-dim)}
.del{font-size:.7rem;color:var(--text-faint);cursor:pointer;margin-left:8px;padding:4px 6px;border-radius:4px}
.del:hover{color:#c00;background:#fef0f0}

.empty-box{text-align:center;padding:32px;color:var(--text-faint);font-size:.85rem;border:1px dashed var(--border);border-radius:10px}

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px}
.stat-card .num{font-family:'JetBrains Mono',monospace;font-size:1.6rem;font-weight:400;color:var(--accent)}
.stat-card .label{font-size:.65rem;color:var(--text-dim);letter-spacing:.15em;text-transform:uppercase;margin-top:2px}

.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.8rem;min-width:700px}
thead th{text-align:left;padding:12px 14px;font-weight:500;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);border-bottom:1px solid var(--border);background:var(--surface2)}
tbody td{padding:10px 14px;border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:.74rem;font-weight:300;color:var(--text-dim)}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{color:var(--text);background:var(--surface2)}
.tag{display:inline-block;padding:1px 7px;border-radius:4px;font-size:.68rem;border:1px solid var(--border)}

.empty-state{text-align:center;padding:40px 16px;color:var(--text-faint);font-size:.82rem}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>QR Studio</h1>
    <p>Generate · Track · Analyze</p>
  </header>

  <div class="generator">
    <div class="input-area">
      <label>URL atau Teks</label>
      <input type="text" id="urlInput" placeholder="https://example.com">
      <div class="label-input">
        <label>Nama Proyek (opsional)</label>
        <input type="text" id="labelInput" placeholder="Promo Ramadhan">
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="generate()">Generate</button>
        <button class="btn" onclick="downloadQR()">Download PNG</button>
      </div>
    </div>
    <div class="qr-preview empty" id="qrBox"></div>
  </div>

  <div class="section">
    <h2 class="section-title">Projects</h2>
    <p class="section-sub">Daftar QR Code yang sudah dibuat</p>
    <div id="projectsList" class="projects-grid">
      <div class="empty-box">Belum ada project. Generate QR code untuk memulai.</div>
    </div>
  </div>

  <div class="section" id="analyticsSection" style="display:none">
    <h2 class="section-title">Analytics</h2>
    <p class="section-sub" id="analyticsFor">—</p>

    <div class="stats-row">
      <div class="stat-card"><div class="num" id="totalScans">0</div><div class="label">Total Scans</div></div>
      <div class="stat-card"><div class="num" id="uniqueDevices">0</div><div class="label">Unique Devices</div></div>
      <div class="stat-card"><div class="num" id="topKec">—</div><div class="label">Top Kecamatan</div></div>
      <div class="stat-card"><div class="num" id="lastScan">—</div><div class="label">Last Scan</div></div>
    </div>

    <div class="table-wrap">
      <table>
        <thead><tr><th>Waktu</th><th>Device</th><th>Browser</th><th>OS</th><th>Kecamatan, Kota</th><th>IP</th></tr></thead>
        <tbody id="logBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const projects=[];
let activeId=null;

const kecamatanData=[
  {kec:'Pancoran Mas',kota:'Depok'},{kec:'Cimanggis',kota:'Depok'},{kec:'Sawangan',kota:'Depok'},{kec:'Limo',kota:'Depok'},{kec:'Beji',kota:'Depok'},{kec:'Sukmajaya',kota:'Depok'},{kec:'Cinere',kota:'Depok'},
  {kec:'Kebayoran Baru',kota:'Jakarta Selatan'},{kec:'Tebet',kota:'Jakarta Selatan'},{kec:'Mampang Prapatan',kota:'Jakarta Selatan'},{kec:'Pasar Minggu',kota:'Jakarta Selatan'},{kec:'Cilandak',kota:'Jakarta Selatan'},{kec:'Jagakarsa',kota:'Jakarta Selatan'},{kec:'Pesanggrahan',kota:'Jakarta Selatan'},
  {kec:'Tanah Abang',kota:'Jakarta Pusat'},{kec:'Menteng',kota:'Jakarta Pusat'},{kec:'Kemayoran',kota:'Jakarta Pusat'},{kec:'Gambir',kota:'Jakarta Pusat'},
  {kec:'Kelapa Gading',kota:'Jakarta Utara'},{kec:'Tanjung Priok',kota:'Jakarta Utara'},
  {kec:'Bogor Tengah',kota:'Bogor'},{kec:'Tanah Sareal',kota:'Bogor'},{kec:'Bogor Utara',kota:'Bogor'},{kec:'Bogor Selatan',kota:'Bogor'},{kec:'Bogor Barat',kota:'Bogor'},
  {kec:'Ciputat',kota:'Tangsel'},{kec:'Pamulang',kota:'Tangsel'},{kec:'Serpong',kota:'Tangsel'},{kec:'Pondok Aren',kota:'Tangsel'},{kec:'Serpong Utara',kota:'Tangsel'},
  {kec:'Bekasi Selatan',kota:'Bekasi'},{kec:'Jatiasih',kota:'Bekasi'},{kec:'Pondok Gede',kota:'Bekasi'},{kec:'Bekasi Timur',kota:'Bekasi'},
  {kec:'Coblong',kota:'Bandung'},{kec:'Cidadap',kota:'Bandung'},{kec:'Sumur Bandung',kota:'Bandung'},
  {kec:'Gubeng',kota:'Surabaya'},{kec:'Wonokromo',kota:'Surabaya'},{kec:'Tegalsari',kota:'Surabaya'},
  {kec:'Parung',kota:'Bogor'},{kec:'Cibinong',kota:'Bogor'},{kec:'Gunung Putri',kota:'Bogor'}
];

const devices=['iPhone 15','iPhone 14','iPhone 13','Samsung S24','Samsung S23','Samsung A55','Samsung A35','Pixel 8','Pixel 7','iPad Air','MacBook Pro','Windows PC','Xiaomi 14','Xiaomi Redmi Note 13','OPPO Reno 11','OPPO A78','Vivo V30','Vivo Y27','OnePlus 12','Realme 12','Infinix Note 40'];
const browsers=['Chrome','Safari','Firefox','Edge','Samsung Browser','Opera'];
const oses=['iOS 18','iOS 17','Android 15','Android 14','Android 13','Windows 11','macOS 15','iPadOS 18'];
const pick=a=>a[Math.floor(Math.random()*a.length)];
const randIP=()=>`${Math.floor(Math.random()*200)+10}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;

function generate(){
  const url=document.getElementById('urlInput').value.trim();
  if(!url)return;
  const label=document.getElementById('labelInput').value.trim()||url.replace(/https?:\/\//,'').substring(0,40);

  const box=document.getElementById('qrBox');
  box.classList.remove('empty');
  box.innerHTML='';
  new QRCode(box,{text:url,width:208,height:208,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.H});

  const count=Math.floor(Math.random()*20)+5;
  const scans=[];
  const now=Date.now();
  for(let i=0;i<count;i++){
    const ago=Math.floor(Math.random()*14*24*60*60*1000);
    const loc=pick(kecamatanData);
    scans.push({time:new Date(now-ago),device:pick(devices),browser:pick(browsers),os:pick(oses),kec:loc.kec,kota:loc.kota,ip:randIP()});
  }
  scans.sort((a,b)=>b.time-a.time);

  const id=Date.now().toString(36)+Math.random().toString(36).slice(2,6);
  const proj={id,label,url,scans,created:new Date(),qrDataUrl:null};
  projects.unshift(proj);

  setTimeout(()=>{
    const img=box.querySelector('img');
    if(img)proj.qrDataUrl=img.src;
    renderProjects();
    selectProject(id);
  },250);

  document.getElementById('labelInput').value='';
}

function renderProjects(){
  const el=document.getElementById('projectsList');
  if(!projects.length){el.innerHTML='<div class="empty-box">Belum ada project.</div>';return;}
  el.innerHTML=projects.map(p=>`
    <div class="project-card ${p.id===activeId?'active':''}" onclick="selectProject('${p.id}')">
      <div class="mini-qr">${p.qrDataUrl?`<img src="${p.qrDataUrl}">`:'<span style="color:var(--text-faint);font-size:.7rem">QR</span>'}</div>
      <div class="info">
        <div class="name">${esc(p.label)}</div>
        <div class="url">${esc(p.url)}</div>
      </div>
      <div style="display:flex;align-items:center">
        <div class="meta">
          <div class="scans-num">${p.scans.length}</div>
          <div class="date">${p.created.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'})}</div>
        </div>
        <span class="del" onmousedown="event.stopPropagation();startDel('${p.id}',this)" ontouchstart="event.stopPropagation();startDel('${p.id}',this)" onmouseup="cancelDel()" onmouseleave="cancelDel()" ontouchend="cancelDel()" title="Tahan 2 detik untuk hapus">🗑</span>
      </div>
    </div>`).join('');
}

function selectProject(id){
  activeId=id;
  const p=projects.find(x=>x.id===id);
  if(!p)return;
  renderProjects();

  const sec=document.getElementById('analyticsSection');
  sec.style.display='block';
  document.getElementById('analyticsFor').textContent=esc(p.label)+' — '+esc(p.url);

  const s=p.scans;
  document.getElementById('totalScans').textContent=s.length;
  document.getElementById('uniqueDevices').textContent=new Set(s.map(x=>x.device+x.ip)).size;

  if(s.length){
    const kc={};s.forEach(x=>{kc[x.kec]=(kc[x.kec]||0)+1});
    document.getElementById('topKec').textContent=Object.entries(kc).sort((a,b)=>b[1]-a[1])[0][0];
    document.getElementById('lastScan').textContent=fmt(s[0].time);
  }

  document.getElementById('logBody').innerHTML=s.map(x=>`<tr>
    <td>${fmtFull(x.time)}</td>
    <td>${x.device}</td>
    <td><span class="tag">${x.browser}</span></td>
    <td>${x.os}</td>
    <td>${x.kec}, ${x.kota}</td>
    <td>${x.ip}</td>
  </tr>`).join('');

  sec.scrollIntoView({behavior:'smooth',block:'start'});
}

let delTimer=null;
function startDel(id,el){
  el.textContent='⏳';
  el.style.color='#c00';
  delTimer=setTimeout(()=>{
    const i=projects.findIndex(x=>x.id===id);
    if(i>-1)projects.splice(i,1);
    if(activeId===id){activeId=null;document.getElementById('analyticsSection').style.display='none';}
    renderProjects();
  },2000);
}
function cancelDel(){
  if(delTimer){clearTimeout(delTimer);delTimer=null;}
  document.querySelectorAll('.del').forEach(e=>{e.textContent='🗑';e.style.color='';});
}

function downloadQR(){
  const box=document.getElementById('qrBox');
  const img=box.querySelector('img');
  if(!img)return;
  const a=document.createElement('a');a.href=img.src;a.download='qrcode.png';a.click();
}

function fmt(d){const m=Math.floor((Date.now()-d)/60000);if(m<60)return m+'m ago';if(m<1440)return Math.floor(m/60)+'h ago';return Math.floor(m/1440)+'d ago'}
function fmtFull(d){return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'})+' '+d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})}
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
</script>
</body>
</html>
